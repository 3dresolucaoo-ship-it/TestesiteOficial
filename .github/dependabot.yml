# Dependabot v2 — Hayzer
# Doc: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
# Otávio G7 · 2026-05-18 · cristaliza plano Tier 2 do audit 2026-05-17 noite

version: 2

updates:
  # ---------- Node.js / npm ----------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    reviewers:
      - "3dresolucaoo-ship-it"
    labels:
      - "dependencies"
      - "auto"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      # Patches de tudo (qualquer dep, qualquer escopo) — sempre safe-ish
      patches:
        applies-to: version-updates
        update-types:
          - "patch"
      # Dev deps em bloco (minor/patch) — risco zero em runtime prod
      dev-dependencies:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major version updates de libs core = breaking quase certo, exige migração manual
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@supabase/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "stripe"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tailwindcss/postcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # ---------- GitHub Actions ----------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    reviewers:
      - "3dresolucaoo-ship-it"
    labels:
      - "dependencies"
      - "auto"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    groups:
      actions-patches:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
